databaseChangeLog:
  - changeSet:
      id: 1-create-producer
      author: amr3
      changes:
        - createTable:
            tableName: producer
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2-create-product
      author: amr3
      changes:
        - createTable:
            tableName: product
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: price
                  type: DECIMAL(10, 2)
                  constraints:
                    nullable: false
              - column:
                  name: producer_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_product_producer
                    references: producer(id)
              # utilizing json type to handle dynamic product attributes without the EAV anti-pattern
              - column:
                  name: attributes
                  type: JSON